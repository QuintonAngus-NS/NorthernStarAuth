<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Northern Star | Login</title>
        <link rel="icon" href="./resouces/Favicon.svg">
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <div id="userInterface">
            <div id="loginHeader">
                <img src="./resouces/NorthernStarLogo(LightDesign).png" class="NorthernStarLogo">
                <div class="headerDivider"></div>
                <div class="headerTitle">Account Login</div>
                <div class="headerSubText">
                    To login to your northern star account, please enter you account details below or 
                    login with a service linked with your account.
                </div>
            </div>

            <div id="loginForm">
                <div class="inputWrapper">
                    <div class="inputHeader">Username</div>
                    <input type="text" placeholder="" id="usernameInput">
                </div>
                <div class="inputWrapper">
                    <div class="inputHeader">Password</div>
                    <input type="password" placeholder="" id="passwordInput">
                    <div id="forgotPassword">Forgot Password?</div>
                </div>
                <div class="btnFilled" id="loginBtn">Login</div>
                <div id="signUpLink">Don't have an account? <b>Sign-Up</b></div>
            </div>

            <div id="servicesDividerWrapper">
                <div class="servicesDivider"></div>
                <div id="orText">OR</div>
                <div class="servicesDivider"></div>
            </div>

            <div id="servicesWrapper">
                <img src="./resouces/GoogleIcon.png" class="serviceIcon">
                <img src="./resouces/GithubIconDark.svg" class="serviceIcon" id="githubIcon">
                <img src="./resouces/MicrosoftIcon.png" class="serviceIcon">
            </div>

            <div id="copyrightText">© NORTHERN STAR 2026 - ALL RIGHTS RESERVED</div>
        </div>
        <div id="SGVgraphics"></div>
    </body>
</html>
